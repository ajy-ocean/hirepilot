name: Build and Release HirePilot APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Framework
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Launcher Icons Generation
        run: flutter pub run flutter_launcher_icons

      - name: Build Split Release APKs
        run: |
          flutter build apk --split-per-abi --release --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Structure Production Artifacts
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-artifacts/HirePilot-v${{ github.ref_name }}-arm64.apk

      - name: Generate Automated GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/HirePilot-v${{ github.ref_name }}-arm64.apk
          name: Release ${{ github.ref_name }}
          body: |
            Automated production build generated securely via GitHub Actions pipeline loops.
            
            ### Artifact Checksums
            - Target Architecture: ARM64-v8a Optimized Mobile Binary
            - API Endpoint Layer: Encrypted & Pre-compiled Native Environment Define
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}