name: hirepilot
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.2.0
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^24.2.7
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/hirepilot_logo.png" 
  min_sdk_android: 21